name: CI

# 데이터(YAML 지식)와 코드의 신뢰성을 매 변경마다 검증한다.
# 릴리즈(release.yml) 이전에 push/PR 단계에서 회귀를 차단하는 것이 목적이다.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}

      # validateKnowledge 는 test 에 의존한다.
      # → YAML 지식 스키마/품질 검증 + 전체 단위·통합 테스트 + MCP 도구 등록 검증을 한 번에 수행한다.
      - name: Validate knowledge & run tests
        run: |
          chmod +x gradlew
          ./gradlew validateKnowledge --no-daemon

      # npm 실행기 문법 검증 (구문 오류로 인한 사용자 실행 실패 방지)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Syntax-check npm launcher
        run: node --check npm/bin/index.js
