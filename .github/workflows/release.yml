name: Release

on:
  release:
    types: [published]

# ── 릴리즈 흐름 ────────────────────────────────────────────────────────────────
#
#  이 리포(commerce-context-mcp)는 소스 코드와 public 릴리즈를 함께 관리합니다.
#  JAR 파일은 이 리포의 GitHub Release에 수동으로 업로드합니다.
#
#  전체 릴리즈 절차:
#  1. ./gradlew bootJar "-Pversion=X.Y.Z"  → JAR 빌드 (로컬)
#  2. dakcoh/commerce-context-mcp 리포에 GitHub Release 생성 후 JAR 업로드 (수동)
#  3. Release Publish  → 이 워크플로우 트리거
#     → 테스트 통과 확인 후 npm publish 자동 실행
#
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
        env:
          GITHUB_REF_NAME: ${{ github.event.release.tag_name }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}

      # ── 전체 테스트와 지식 YAML 스키마 통과 확인 ─────────────────────────────
      - name: Validate knowledge & build
        run: |
          chmod +x gradlew
          ./gradlew validateKnowledge bootJar "-Pversion=${{ steps.version.outputs.VERSION }}" --no-daemon

      # ── npm 패키지 버전 동기화 후 publish ─────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Sync npm version, verify release asset, and publish
        working-directory: npm
        run: |
          node -e "
            const fs  = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ steps.version.outputs.VERSION }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('npm version:', pkg.version);
          "
          curl -fIL "https://github.com/dakcoh/commerce-context-mcp/releases/download/v${{ steps.version.outputs.VERSION }}/context-engine-${{ steps.version.outputs.VERSION }}.jar"
          npm whoami
          npm pack --dry-run
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
