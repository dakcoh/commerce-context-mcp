spring-commerce:
  items:
    - id: spring-commerce-modular-monolith
      category: architecture
      title: "Spring 이커머스 시작 구조: 모듈형 모놀리스"
      summary: "초기부터 MSA로 쪼개지 말고 도메인 경계를 코드 모듈로 분리한 Spring Boot 애플리케이션으로 시작한다."
      business-context: |
        이커머스는 상품, 주문, 재고, 결제, 프로모션, 배송, 정산이 서로 연결된다.
        초기 단계에서 서비스까지 물리적으로 분리하면 장애 추적, 배포, 데이터 정합성 관리 비용이 빠르게 커진다.
      spring-guidance:
        - "catalog, order, inventory, payment, promotion, fulfillment, settlement 패키지를 도메인 기준으로 분리한다."
        - "도메인 간 호출은 공개 application service를 통해 수행하고 다른 모듈의 Repository를 직접 사용하지 않는다."
        - "트랜잭션 경계는 application service에 두고 Controller는 입력 검증과 응답 변환만 담당한다."
        - "외부 연동은 adapter 패키지로 격리한다."
      avoid-patterns:
        - "Controller에서 여러 Repository를 직접 호출하지 않는다."
        - "처음부터 모든 도메인을 독립 MSA로 분리하지 않는다."
        - "common 패키지에 도메인 로직을 무분별하게 모으지 않는다."
      checklist:
        - "도메인별 패키지 경계가 있는가?"
        - "다른 모듈의 Repository를 직접 참조하지 않는가?"
        - "외부 PG, 택배, 채널 API가 adapter로 격리됐는가?"
      tags: [spring, architecture, modular-monolith, package, adapter]

    - id: spring-commerce-transaction-boundary
      category: transaction
      title: "트랜잭션 경계: 짧고 명확하게 유지한다"
      summary: "DB 트랜잭션 안에서 외부 API를 오래 기다리지 말고, 로컬 상태 변경과 외부 연동을 분리한다."
      business-context: |
        주문 처리 중 PG, 택배사, 외부 채널을 호출하면 응답 지연과 타임아웃이 발생할 수 있다.
        긴 트랜잭션은 DB 커넥션과 락을 오래 점유해 주문 처리량을 떨어뜨린다.
      spring-guidance:
        - "@Transactional은 public application service 메서드에 적용한다."
        - "외부 API 호출 전후의 로컬 상태를 PENDING, UNCERTAIN 같은 상태로 기록한다."
        - "외부 API 호출과 후속 처리는 Outbox, 이벤트, 스케줄러로 연결한다."
        - "readOnly = true를 조회 트랜잭션에 적용하되 실제 쓰기가 섞이지 않도록 한다."
      avoid-patterns:
        - "@Transactional 메서드 안에서 PG 응답을 장시간 기다리지 않는다."
        - "같은 클래스 내부 호출로 @Transactional 프록시가 우회되는 구조를 만들지 않는다."
        - "예외를 삼켜 롤백이 누락되게 하지 않는다."
      checklist:
        - "트랜잭션 안에 느린 외부 API 호출이 없는가?"
        - "실패와 타임아웃 상태를 DB에 남기는가?"
        - "self-invocation으로 트랜잭션 프록시를 우회하지 않는가?"
      tags: [spring, transaction, transactional, outbox, timeout, self-invocation]

    - id: spring-commerce-jpa-consistency
      category: persistence
      title: "JPA 영속성: 엔티티와 조회 모델을 분리한다"
      summary: "주문 원장 엔티티를 API 응답에 직접 노출하지 말고, 쓰기 모델과 조회 DTO를 분리한다."
      business-context: |
        주문과 상품은 연관관계가 많고 데이터가 빠르게 늘어난다.
        엔티티 그래프를 그대로 직렬화하면 N+1, 순환 참조, 과도한 조회가 발생하기 쉽다.
      spring-guidance:
        - "JPA Entity는 내부 쓰기 모델로 사용하고 API 응답은 DTO 또는 projection으로 반환한다."
        - "목록 조회는 fetch join 남용보다 projection, batch fetch, 별도 조회 모델을 선택한다."
        - "주문 라인 가격과 상품 정보는 현재 Product Entity 참조만 믿지 말고 스냅샷으로 저장한다."
        - "대량 배치는 offset보다 cursor 기반 페이징을 우선한다."
      avoid-patterns:
        - "Entity를 Controller 응답으로 직접 반환하지 않는다."
        - "모든 연관관계를 EAGER로 설정하지 않는다."
        - "대량 데이터를 findAll()로 메모리에 올리지 않는다."
      checklist:
        - "API DTO와 JPA Entity가 분리됐는가?"
        - "목록 조회의 N+1을 검증했는가?"
        - "대량 배치가 cursor 기반으로 동작하는가?"
      tags: [spring, jpa, entity, dto, projection, n-plus-one, cursor]

    - id: spring-commerce-locking-idempotency
      category: concurrency
      title: "동시성 제어와 멱등성: DB 제약을 마지막 안전망으로 둔다"
      summary: "낙관락, 비관락, Redis를 상황에 맞게 선택하고 UNIQUE 제약과 멱등성 키를 함께 사용한다."
      business-context: |
        재고 차감, 결제 요청, 쿠폰 발급은 동시에 같은 자원을 변경한다.
        애플리케이션의 사전 조회만으로는 중복 처리와 오버셀링을 막을 수 없다.
      spring-guidance:
        - "충돌이 드문 엔티티는 @Version 낙관락과 제한된 재시도를 사용한다."
        - "충돌이 잦은 단일 DB 자원은 PESSIMISTIC_WRITE와 락 타임아웃을 검토한다."
        - "선착순 접수는 Redis Lua Script를 사용하되 DB UNIQUE 제약을 최종 안전망으로 둔다."
        - "멱등성 키와 처리 결과를 저장하고 같은 키 요청에는 기존 결과를 반환한다."
      avoid-patterns:
        - "SELECT 후 애플리케이션 if 검사만으로 중복 처리를 막지 않는다."
        - "재시도 횟수 제한 없는 낙관락 루프를 만들지 않는다."
        - "Redis 성공만으로 최종 원장 저장이 완료됐다고 간주하지 않는다."
      checklist:
        - "충돌 빈도에 맞는 락 전략을 선택했는가?"
        - "UNIQUE 제약과 멱등성 키가 있는가?"
        - "재시도 횟수, backoff, 락 타임아웃이 있는가?"
      tags: [spring, jpa, version, pessimistic-lock, redis, idempotency, unique]

    - id: spring-commerce-validation-errors
      category: api
      title: "API 계약: 검증 오류와 비즈니스 오류를 분리한다"
      summary: "Bean Validation, 비즈니스 예외, 외부 연동 오류를 구분하고 일관된 오류 응답을 제공한다."
      business-context: |
        주문 수량 오류, 재고 부족, 결제 타임아웃은 서로 다른 후속 조치가 필요하다.
        모두 500 오류로 반환하면 클라이언트와 운영자가 복구 방법을 결정할 수 없다.
      spring-guidance:
        - "요청 DTO에는 @NotNull, @Positive, @Size 같은 Bean Validation을 적용한다."
        - "@RestControllerAdvice에서 오류 코드, 메시지, correlationId를 일관되게 반환한다."
        - "재고 부족, 쿠폰 만료, 상태 전이 거부는 명시적인 비즈니스 오류 코드로 표현한다."
        - "로그에는 correlationId를 남기고 개인정보와 결제 민감 정보는 마스킹한다."
      avoid-patterns:
        - "예상 가능한 비즈니스 오류를 RuntimeException 하나로 처리하지 않는다."
        - "내부 stack trace를 API 응답에 노출하지 않는다."
        - "카드 정보, 이메일, 전화번호를 평문 로그로 남기지 않는다."
      checklist:
        - "입력 검증과 비즈니스 검증이 분리됐는가?"
        - "오류 응답에 안정적인 errorCode와 correlationId가 있는가?"
        - "민감 정보가 로그에서 마스킹되는가?"
      tags: [spring, validation, controller-advice, error-code, correlation-id, masking]

    - id: spring-commerce-events-outbox
      category: messaging
      title: "이벤트 발행: Outbox와 멱등 Consumer를 기본으로 고려한다"
      summary: "DB 커밋과 메시지 발행 사이의 유실을 줄이고, 이벤트 중복 전달을 안전하게 처리한다."
      business-context: |
        주문 완료 후 재고, 포인트, 알림, 정산 이벤트를 발행할 수 있다.
        DB 저장 직후 장애가 나거나 Consumer가 재시도되면 누락과 중복이 발생한다.
      spring-guidance:
        - "도메인 상태와 outbox 레코드를 같은 DB 트랜잭션에서 저장한다."
        - "별도 publisher가 미발행 outbox를 읽어 메시지 브로커로 전달한다."
        - "Consumer는 eventId 또는 비즈니스 키로 처리 이력을 저장해 멱등하게 동작한다."
        - "재시도 횟수 제한, DLQ, 운영자 재처리 절차를 준비한다."
      avoid-patterns:
        - "DB 커밋 후 즉시 메시지를 한 번만 보내고 성공을 가정하지 않는다."
        - "Consumer가 정확히 한 번만 호출된다고 가정하지 않는다."
        - "DLQ 없이 무한 재시도하지 않는다."
      checklist:
        - "상태 변경과 outbox 저장이 같은 트랜잭션인가?"
        - "Consumer가 중복 이벤트에 안전한가?"
        - "DLQ와 운영 재처리 절차가 있는가?"
      tags: [spring, outbox, event, consumer, idempotency, dlq]

    - id: spring-commerce-cache-boundary
      category: cache
      title: "Redis 캐시: 원장과 가속 계층의 역할을 구분한다"
      summary: "Redis를 빠른 조회와 접수 제어에 사용하되 주문·결제·정산의 최종 원장으로 취급하지 않는다."
      business-context: |
        상품 조회와 선착순 이벤트는 Redis의 도움을 받을 수 있다.
        하지만 캐시 만료, 장애, 데이터 유실을 전제로 DB 원장과 복구 경로가 필요하다.
      spring-guidance:
        - "@Cacheable은 변경 빈도와 허용 가능한 stale time이 명확한 조회에만 적용한다."
        - "캐시 키에 도메인, 버전, 식별자를 포함한다."
        - "재고와 쿠폰 접수에 Redis를 사용하면 DB 원장과 불일치 보정 작업을 준비한다."
        - "장애 시 fail-open과 fail-closed 정책을 기능별로 결정한다."
      avoid-patterns:
        - "결제 성공 여부와 정산 결과를 Redis에만 저장하지 않는다."
        - "캐시 무효화 정책 없이 상품 가격을 장시간 캐시하지 않는다."
        - "Redis 장애 시 무제한 DB fallback으로 장애를 증폭시키지 않는다."
      checklist:
        - "DB 원장과 Redis 역할이 분리됐는가?"
        - "TTL과 캐시 무효화 정책이 있는가?"
        - "Redis 장애 시 기능별 정책과 보정 작업이 있는가?"
      tags: [spring, redis, cache, ttl, fail-open, fail-closed, reconciliation]

    - id: spring-commerce-scheduler-batch
      category: batch
      title: "스케줄러와 배치: 중복 실행과 재시작을 견딘다"
      summary: "정산, 예약 만료, 결제 대사 배치는 여러 번 실행되어도 안전하고 중단 지점부터 복구 가능해야 한다."
      business-context: |
        이커머스 운영에는 재고 예약 만료, 망취소 대사, 정산 같은 주기 작업이 필요하다.
        서버가 여러 대면 같은 스케줄러가 동시에 실행될 수 있다.
      spring-guidance:
        - "배치 실행 ID와 처리 대상 키에 UNIQUE 제약을 둔다."
        - "다중 인스턴스에서는 DB 락 또는 ShedLock 같은 실행 조정 수단을 검토한다."
        - "대량 처리는 cursor 기반 페이징과 chunk 단위 커밋을 사용한다."
        - "실패 시 마지막 처리 지점과 실패 원인을 기록한다."
      avoid-patterns:
        - "@Scheduled가 한 번만 실행된다고 가정하지 않는다."
        - "전체 테이블을 한 번에 메모리에 올리지 않는다."
        - "부분 실패 후 처음부터 무조건 다시 처리하지 않는다."
      checklist:
        - "배치가 멱등한가?"
        - "다중 인스턴스 중복 실행을 제어하는가?"
        - "cursor, chunk, 재시작 지점이 있는가?"
      tags: [spring, scheduled, batch, shedlock, cursor, chunk, restart]

    - id: spring-commerce-testing-observability
      category: quality
      title: "테스트와 관측성: 핵심 불변식을 자동 검증한다"
      summary: "단순 CRUD 테스트를 넘어 동시성, 멱등성, 금액 정합성, 복구 흐름을 검증한다."
      business-context: |
        이커머스 장애는 정상 흐름보다 재시도와 경계값에서 발생한다.
        운영 중에는 특정 주문이 왜 멈췄는지 correlation ID로 추적할 수 있어야 한다.
      spring-guidance:
        - "Testcontainers로 PostgreSQL과 Redis를 포함한 통합 테스트를 구성한다."
        - "동시 요청 테스트로 오버셀링, 중복 쿠폰, 중복 결제를 검증한다."
        - "Micrometer 지표에 주문 실패율, 결제 UNCERTAIN 수, 예약 만료 수, 정산 누락 수를 노출한다."
        - "구조화 로그에 orderId, paymentId, correlationId를 남긴다."
      avoid-patterns:
        - "H2 테스트만 통과하면 PostgreSQL에서도 안전하다고 가정하지 않는다."
        - "정상 흐름 테스트만 작성하지 않는다."
        - "주문 ID 없이 자유 형식 로그만 남기지 않는다."
      checklist:
        - "PostgreSQL과 Redis 통합 테스트가 있는가?"
        - "동시성과 재시도 테스트가 있는가?"
        - "핵심 운영 지표와 correlationId 로그가 있는가?"
      tags: [spring, testcontainers, postgres, redis, micrometer, observability, concurrency-test]

    - id: java-domain-modeling
      category: java-core
      title: "Java 도메인 모델링: 원시 타입 집착을 줄이고 의미 있는 타입을 둔다"
      summary: "orderId, money, quantity, email 같은 값을 String과 long으로 흩뿌리지 말고 값 객체와 검증 규칙으로 묶는다."
      business-context: |
        이커머스 코드는 주문 ID, 상품 ID, 금액, 수량, 상태, 정책 버전처럼 비슷해 보이지만 의미가 다른 값을 많이 다룬다.
        의미 없는 원시 타입만 사용하면 파라미터 순서 실수, 통화 혼동, 음수 수량 같은 오류가 컴파일 단계에서 걸리지 않는다.
      spring-guidance:
        - "Money, Quantity, OrderNo, SkuId 같은 값 객체를 사용해 의미와 검증을 묶는다."
        - "불변 값은 record 또는 final 필드를 가진 클래스로 표현한다."
        - "도메인 생성자나 정적 팩토리에서 null, 음수, 빈 문자열을 검증한다."
        - "JPA Entity와 도메인 값 객체 사이의 매핑 책임을 명확히 둔다."
      avoid-patterns:
        - "모든 식별자와 상태를 String으로만 전달하지 않는다."
        - "금액, 수량, 할인율을 검증 없이 primitive로 넘기지 않는다."
        - "DTO 검증만 믿고 도메인 내부 검증을 생략하지 않는다."
      checklist:
        - "식별자, 금액, 수량에 의미 있는 타입이 있는가?"
        - "값 객체가 불변이고 생성 시 검증되는가?"
        - "DTO와 도메인 모델의 책임이 분리되어 있는가?"
      tags: [java, domain-model, value-object, record, validation, type-safety]

    - id: java-null-exception-boundary
      category: java-core
      title: "Null과 예외 경계: 실패 가능성을 타입과 계약으로 드러낸다"
      summary: "null을 암묵적인 실패 신호로 쓰지 말고 Optional, 명시적 예외, 결과 타입으로 호출자 계약을 분명히 한다."
      business-context: |
        상품 없음, 쿠폰 만료, 재고 부족, 결제 불명확은 서로 다른 의미를 가진 실패다.
        이를 null이나 RuntimeException 하나로 표현하면 AI가 후속 처리와 복구 흐름을 잘못 생성하기 쉽다.
      spring-guidance:
        - "조회 결과가 없을 수 있는 Repository/Service는 Optional 또는 명시적 NotFound 예외를 사용한다."
        - "비즈니스 규칙 위반은 도메인 예외와 안정적인 errorCode로 표현한다."
        - "외부 API 실패는 timeout, retryable, non-retryable, uncertain 상태로 분리한다."
        - "예외 변환은 ControllerAdvice 또는 adapter boundary에서 수행한다."
      avoid-patterns:
        - "null 반환 후 호출자에게 암묵적으로 판단을 맡기지 않는다."
        - "모든 실패를 RuntimeException 또는 500 응답으로 처리하지 않는다."
        - "외부 API 타임아웃을 단순 실패로 확정하지 않는다."
      checklist:
        - "없음, 규칙 위반, 외부 장애가 다른 타입/코드로 표현되는가?"
        - "null 반환 정책이 명확하거나 제거됐는가?"
        - "예외가 계층 경계에서 일관되게 변환되는가?"
      tags: [java, "null", optional, exception, error-code, boundary]

    - id: java-collections-streams
      category: java-core
      title: "컬렉션과 Stream: 대량 데이터와 부작용을 구분한다"
      summary: "Stream은 메모리 안의 컬렉션 변환에 적합하며 DB 대량 처리나 외부 호출 반복을 숨기는 도구가 아니다."
      business-context: |
        주문, 정산, 상품 인덱싱은 데이터가 빠르게 커진다.
        작은 목록에서 동작하던 stream().map() 코드가 전체 주문 테이블이나 외부 API 호출과 결합되면 장애를 만들 수 있다.
      spring-guidance:
        - "대량 DB 처리는 cursor, slice, chunk 단위로 나눈다."
        - "Stream 내부에서 외부 API 호출이나 Repository 호출을 반복하지 않는다."
        - "parallelStream은 트랜잭션, EntityManager, 외부 API rate limit과 충돌할 수 있으므로 신중히 사용한다."
        - "변경 가능한 컬렉션을 공유할 때는 동시성 경계를 명시한다."
      avoid-patterns:
        - "findAll().stream()으로 대량 배치를 처리하지 않는다."
        - "stream map 안에서 N+1 Repository 호출을 만들지 않는다."
        - "parallelStream으로 결제, 재고, 정산 같은 상태 변경을 병렬 처리하지 않는다."
      checklist:
        - "대량 처리가 cursor 또는 chunk 기반인가?"
        - "Stream 내부에 숨은 DB/API 반복 호출이 없는가?"
        - "병렬 처리 시 트랜잭션과 rate limit 경계가 명확한가?"
      tags: [java, collection, stream, batch, cursor, n-plus-one, parallel]

    - id: spring-security-authz
      category: security
      title: "Spring Security 권한: 인증, 인가, 소유권 검증을 분리한다"
      summary: "로그인 여부만 확인하지 말고 사용자, 판매자, 운영자 권한과 리소스 소유권을 함께 검증한다."
      business-context: |
        이커머스에는 고객, 판매자, CS 운영자, 관리자, 배치 시스템처럼 서로 다른 행위자가 있다.
        주문 조회, 환불, 정산, 상품 수정은 권한과 소유권이 잘못되면 개인정보 노출이나 금전 피해로 이어진다.
      spring-guidance:
        - "인증(Authentication), 역할 기반 인가(Role), 리소스 소유권 검증을 분리한다."
        - "Controller 진입 전에는 coarse-grained 권한을 확인하고 Service에서 도메인 소유권을 검증한다."
        - "관리자 기능은 조회 권한과 수정 권한을 나누고 사유 입력과 감사 로그를 요구한다."
        - "JWT claim을 그대로 신뢰하지 말고 필요한 경우 서버 원장과 대조한다."
      avoid-patterns:
        - "isAuthenticated()만으로 주문 상세 조회를 허용하지 않는다."
        - "판매자 ID를 요청 파라미터로 받아 그대로 신뢰하지 않는다."
        - "관리자 권한 하나로 모든 조회와 수정을 허용하지 않는다."
      checklist:
        - "사용자 역할과 리소스 소유권 검증이 모두 있는가?"
        - "판매자/운영자 기능의 권한 경계가 분리되어 있는가?"
        - "민감 조작에 감사 로그와 사유가 남는가?"
      tags: [spring, security, authentication, authorization, ownership, audit, jwt]

    - id: spring-configuration-secrets
      category: configuration
      title: "설정과 Secret: 환경별 설정과 민감 값을 코드에서 분리한다"
      summary: "PG 키, JWT secret, 외부 API endpoint, feature flag는 환경별 설정으로 관리하고 소스 코드와 로그에 노출하지 않는다."
      business-context: |
        이커머스는 PG, 택배사, 알림, 검색, 외부 채널처럼 많은 외부 시스템과 연결된다.
        운영과 개발 설정이 섞이면 실제 결제 호출, 잘못된 웹훅 검증, 개인정보 유출 같은 사고가 발생할 수 있다.
      spring-guidance:
        - "@ConfigurationProperties로 설정을 타입 안전하게 바인딩하고 검증한다."
        - "dev, local, staging, prod profile을 분리하고 기본값이 운영 사고를 만들지 않게 한다."
        - "Secret은 환경 변수, vault, secret manager로 주입한다."
        - "설정 값 출력 로그에서 key, token, secret, password를 마스킹한다."
      avoid-patterns:
        - "PG secret이나 JWT secret을 application.yml에 평문 커밋하지 않는다."
        - "운영 profile 기본값을 local endpoint로 두지 않는다."
        - "외부 API 키를 예외 메시지나 디버그 로그에 출력하지 않는다."
      checklist:
        - "외부 연동 설정이 @ConfigurationProperties로 검증되는가?"
        - "운영 Secret이 소스 코드에 없고 로그에서 마스킹되는가?"
        - "환경별 profile과 feature flag 기본값이 안전한가?"
      tags: [spring, configuration, profile, secret, vault, properties, masking]

    - id: spring-schema-migration
      category: persistence
      title: "스키마 마이그레이션: 주문 원장은 무중단 변경을 전제로 설계한다"
      summary: "Flyway/Liquibase로 스키마 변경을 버전 관리하고, 대형 테이블 변경은 expand-migrate-contract 순서로 진행한다."
      business-context: |
        주문, 결제, 정산 테이블은 서비스가 커질수록 중단 없이 변경해야 한다.
        컬럼 추가, 인덱스 생성, 상태 값 변경을 단순 DDL로 처리하면 배포 중 락, 데이터 불일치, 롤백 불가 문제가 생긴다.
      spring-guidance:
        - "Flyway 또는 Liquibase로 스키마 변경 이력을 코드와 함께 관리한다."
        - "nullable 컬럼 추가, 백필, 코드 전환, not null 제약 추가를 단계적으로 수행한다."
        - "대형 테이블 인덱스는 DB별 online/concurrent 옵션을 검토한다."
        - "enum 상태 변경은 이전 버전 코드와의 호환성을 고려한다."
      avoid-patterns:
        - "운영 DB에 수동 DDL을 적용하고 이력을 남기지 않는 방식을 피한다."
        - "대형 주문 테이블에 default not null 컬럼을 한 번에 추가하지 않는다."
        - "배포 전후 코드가 함께 읽는 상태 값을 갑자기 삭제하지 않는다."
      checklist:
        - "스키마 변경이 Flyway/Liquibase로 버전 관리되는가?"
        - "대형 테이블 변경에 expand-migrate-contract 계획이 있는가?"
        - "롤백 또는 forward-fix 전략이 명확한가?"
      tags: [spring, database, migration, flyway, liquibase, zero-downtime, schema]

    - id: spring-api-pagination-idempotent-post
      category: api
      title: "REST API 설계: 페이지네이션과 멱등 POST 계약을 명확히 한다"
      summary: "목록 API는 cursor 기반 탐색을 우선하고, 주문 생성 같은 POST는 idempotency key로 중복 실행을 방어한다."
      business-context: |
        상품, 주문, 정산 목록은 데이터가 빠르게 커지고 정렬 기준도 자주 바뀐다.
        주문 생성이나 결제 요청은 사용자의 재클릭, 네트워크 재시도, 클라이언트 타임아웃으로 같은 요청이 여러 번 도착할 수 있다.
      spring-guidance:
        - "대량 목록 API는 offset/limit보다 cursor, sort key, hasNext를 포함한 응답을 우선한다."
        - "정렬 기준은 안정적인 unique tie-breaker를 포함한다."
        - "주문 생성, 결제 요청, 쿠폰 사용 같은 POST에는 idempotency key를 받는다."
        - "같은 idempotency key 요청에는 최초 처리 결과 또는 동일한 오류 계약을 반환한다."
      avoid-patterns:
        - "page=99999 같은 offset 페이지로 대형 테이블을 깊게 스캔하지 않는다."
        - "createdAt 단독 정렬처럼 중복 값에서 순서가 흔들리는 cursor를 사용하지 않는다."
        - "사용자 재시도마다 주문을 새로 만들지 않는다."
      checklist:
        - "목록 API에 안정적인 cursor와 tie-breaker가 있는가?"
        - "상태 변경 POST가 idempotency key를 받는가?"
        - "중복 요청의 응답 계약이 정의되어 있는가?"
      tags: [spring, rest-api, cursor, pagination, idempotency, post]

    - id: spring-database-index-isolation
      category: persistence
      title: "DB 인덱스와 격리 수준: 조회 패턴과 정합성 위험을 함께 본다"
      summary: "인덱스는 where/order by/join 패턴에 맞춰 설계하고, 격리 수준은 재고·정산 불변식을 기준으로 선택한다."
      business-context: |
        이커머스의 주문, 결제, 정산 테이블은 쓰기량과 조회량이 모두 많다.
        잘못된 인덱스는 배치 지연을 만들고, 격리 수준 오해는 중복 처리와 정산 누락을 만든다.
      spring-guidance:
        - "Repository 메서드의 where 조건, 정렬, join 대상에 맞춰 복합 인덱스를 설계한다."
        - "cursor pagination의 sort key와 index 순서를 일치시킨다."
        - "재고 차감, 쿠폰 발급, 정산 대상 확정에는 격리 수준과 락 범위를 명시한다."
        - "실행 계획과 slow query를 운영 지표로 관측한다."
      avoid-patterns:
        - "인덱스 없이 상태 + 기간 조건으로 대형 주문 테이블을 스캔하지 않는다."
        - "트랜잭션 격리 수준 기본값만 믿고 phantom read 가능성을 무시하지 않는다."
        - "복합 인덱스 컬럼 순서를 조회 조건과 다르게 둔다."
      checklist:
        - "핵심 조회마다 실행 계획을 확인했는가?"
        - "cursor 정렬과 복합 인덱스 순서가 맞는가?"
        - "동시 변경이 있는 업무의 격리 수준과 락 범위가 문서화됐는가?"
      tags: [spring, database, index, isolation, lock, slow-query, cursor]

    - id: java-concurrency-executor-completablefuture
      category: java-core
      title: "Java 17 비동기 처리: Executor와 CompletableFuture 경계를 분명히 한다"
      summary: "비동기 코드는 전용 Executor, timeout, 예외 처리, 컨텍스트 전파를 명시하고 트랜잭션 경계를 넘기지 않는다."
      business-context: |
        주문 후 알림, 외부 채널 동기화, 검색 인덱싱처럼 느린 후속 작업을 비동기로 처리할 수 있다.
        하지만 무제한 thread pool이나 트랜잭션 컨텍스트 착각은 장애 시 더 큰 지연과 데이터 불일치를 만든다.
      spring-guidance:
        - "@Async나 CompletableFuture에는 업무별 전용 Executor와 큐 크기 제한을 설정한다."
        - "비동기 작업에는 timeout, retry, fallback, 실패 기록을 둔다."
        - "DB 트랜잭션 커밋 전 상태를 비동기 작업이 읽는 구조를 피한다."
        - "correlationId 같은 추적 컨텍스트를 명시적으로 전달한다."
      avoid-patterns:
        - "ForkJoinPool.commonPool에 결제, 재고, 외부 API 작업을 무분별하게 태우지 않는다."
        - "CompletableFuture 예외를 join 시점까지 방치하지 않는다."
        - "@Transactional 메서드 내부에서 비동기 작업이 같은 영속성 컨텍스트를 쓴다고 가정하지 않는다."
      checklist:
        - "비동기 업무별 Executor와 큐 제한이 있는가?"
        - "timeout, 예외 처리, 실패 재처리 경로가 있는가?"
        - "트랜잭션 커밋 이후 실행되어야 하는 작업이 분리되어 있는가?"
      tags: [java, java17, async, executor, completablefuture, timeout, correlation-id]

    - id: spring-resilience-retry-timeout
      category: integration
      title: "외부 연동 회복성: timeout, retry, circuit breaker를 업무별로 다르게 둔다"
      summary: "PG, 택배, 알림, 검색, 외부 채널 API는 같은 재시도 정책을 쓰지 말고 업무 영향에 따라 실패 처리를 분리한다."
      business-context: |
        이커머스는 외부 시스템 장애를 피할 수 없다.
        결제 승인은 신중한 대사가 필요하고, 알림 발송은 지연 허용이 크며, 배송 추적은 재처리 가능한 데이터다.
      spring-guidance:
        - "WebClient나 RestClient 호출에 connect/read timeout을 명시한다."
        - "재시도 가능한 오류와 재시도하면 안 되는 오류를 코드별로 분리한다."
        - "Resilience4j 같은 circuit breaker, bulkhead, retry를 업무별로 설정한다."
        - "외부 호출 결과가 불명확하면 UNCERTAIN 상태와 대사 작업으로 넘긴다."
      avoid-patterns:
        - "무제한 재시도로 PG나 채널 API 장애를 증폭시키지 않는다."
        - "timeout 없는 HTTP client를 운영에 사용하지 않는다."
        - "결제 타임아웃을 단순 실패로 확정하지 않는다."
      checklist:
        - "외부 API별 timeout과 retry 정책이 정의되어 있는가?"
        - "불명확 결과를 대사하는 상태와 배치가 있는가?"
        - "circuit breaker와 bulkhead로 장애 전파를 제한하는가?"
      tags: [spring, integration, resilience4j, timeout, retry, circuit-breaker, uncertain]

    - id: spring-deployment-health-rollout
      category: operations
      title: "배포와 헬스체크: readiness 기준과 롤백 조건을 명확히 한다"
      summary: "애플리케이션 기동 성공만 보지 말고 DB, Redis, 외부 설정, 배치 중복, 핵심 API readiness를 검증한다."
      business-context: |
        이커머스 배포는 주문과 결제 흐름을 건드릴 수 있다.
        새 버전이 기동은 됐지만 DB 마이그레이션, 외부 API 설정, 캐시 연결이 틀리면 고객 주문이 바로 실패한다.
      spring-guidance:
        - "Spring Boot Actuator health에 liveness와 readiness를 분리한다."
        - "readiness에는 DB 연결, migration 상태, Redis 필요 기능, 핵심 설정 검증을 포함한다."
        - "blue-green 또는 rolling 배포 시 이전 버전과 새 버전의 스키마 호환성을 확인한다."
