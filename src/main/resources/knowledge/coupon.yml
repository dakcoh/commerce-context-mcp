coupon:
  items:
    - id: coupon-validation
      category: validation
      title: "쿠폰 유효성 검증 — AI가 항상 빠뜨리는 5가지"
      summary: "쿠폰 적용 전 유효 기간·사용 조건·중복 사용·발급 대상을 서버 측에서 모두 검증해야 한다"
      guidance:
        - "유효 기간: 발급일 기준 만료 여부 — 서버 시간 기준, 클라이언트 시간 믿지 말 것"
        - "사용 대상 조건: 특정 카테고리/상품/최소 주문금액 제한 여부 확인"
        - "중복 사용 여부: 이미 사용된 쿠폰인지 확인 (쿠폰 상태: ISSUED → USED)"
        - "1인 사용 한도: 동일 쿠폰 코드를 동일 유저가 여러 번 사용하는 시나리오 방어"
        - "발급 대상 검증: 특정 유저에게만 발급된 쿠폰을 타인이 사용하는 시나리오 방어"
        - "쿠폰 상태 업데이트 시 낙관락 또는 CAS(Compare-And-Swap) 처리 — 동시 요청으로 중복 사용 방지"
      avoid-patterns:
        - "클라이언트 만료 시간 신뢰 — 서버 시간 기준으로 반드시 재검증"
        - "동시성 제어 없이 쿠폰 상태 업데이트 — 동시에 같은 쿠폰 적용 요청 시 중복 사용 가능"
      checklist:
        - "쿠폰 유효 기간을 서버 시간 기준으로 검증하는가?"
        - "쿠폰 적용 대상 조건(카테고리/상품/최소금액)을 검증하는가?"
        - "쿠폰 중복 사용 방지 (상태 USED 확인)가 있는가?"
        - "쿠폰 상태 업데이트 시 동시성 제어(낙관락/CAS)가 있는가?"
      tags: [coupon, validation, expiry, duplicate-use, concurrency]

    - id: coupon-discount-calculation
      category: calculation
      title: "쿠폰 할인 금액 계산 — 복잡도 높은 케이스"
      summary: "정률 할인의 cap 처리, 복수 쿠폰 적용 순서, 부분 취소 역산까지 정책을 명확히 정의해야 한다"
      guidance:
        - "정률 할인 cap(최대 할인 금액) 처리: 예) 20% 할인, 최대 5,000원 → 50,000원 주문 시 할인액 = min(10,000, 5,000) = 5,000원"
        - "복수 쿠폰 적용 순서: 정률 쿠폰 먼저, 정액 쿠폰 나중 — 순서에 따라 최종 할인액 달라짐"
        - "플랫폼 정책으로 쿠폰 중복 적용 가능 여부 정의 필요"
        - "쿠폰 + 포인트 병행 사용: 쿠폰 할인 후 잔액에 포인트 적용인지 원금에 적용인지 정책 확인 필수"
        - "부분 취소 시 쿠폰 할인 금액 비율 역산 — 최소 주문금액 미달 시 쿠폰 자동 무효화 처리"
      avoid-patterns:
        - "정률 할인 cap 처리 누락 — 최대 할인 금액 초과 발생"
        - "복수 쿠폰 적용 순서 미정의 — 최종 할인액이 정책과 달라짐"
        - "부분 취소 후 쿠폰 재검증 누락 — 최소 주문금액 조건 미달 쿠폰이 유효 상태로 잔존"
      checklist:
        - "정률 할인의 최대 할인 금액 캡(cap)이 처리됐는가?"
        - "복수 쿠폰 적용 순서(정률 → 정액) 정책이 정의됐는가?"
        - "부분 취소 시 쿠폰 할인 금액 역산 및 무효화 처리가 있는가?"
      tags: [coupon, discount, calculation, partial-cancel, point]

    - id: coupon-issuance
      category: issuance
      title: "선착순 쿠폰 발급 — 동시성 제어"
      summary: "선착순 쿠폰 발급은 Redis 원자적 연산 또는 메시지 큐로 오버이슈와 이중 발급을 방지해야 한다"
      guidance:
        - "Redis 원자적 연산 (권장): DECR coupon:stock:{couponId} → 0 미만이면 발급 거부 / SETNX coupon:issued:{couponId}:{userId} → 중복 발급 방지"
        - "DB 비관락: SELECT ... FOR UPDATE → 발급 수량 체크 + 업데이트 원자적 처리 (단: 트래픽 폭주 시 DB 커넥션 소진 위험)"
        - "메시지 큐 (비동기 발급): 발급 요청 → 큐 적재 → 워커가 순차 처리 (장점: DB 부하 분산 / 단점: 즉시 발급 피드백 불가)"
        - "이중 발급 방어: userId + couponId 조합에 UNIQUE 제약 조건 필수"
      avoid-patterns:
        - "동시성 제어 없이 발급 수량만 체크 — 동시 요청 폭주 시 오버이슈 발생"
        - "userId + couponId UNIQUE 제약 조건 누락 — 이중 발급 가능"
      checklist:
        - "선착순 쿠폰 발급 시 오버이슈 방지 로직이 있는가?"
        - "userId + couponId에 UNIQUE 제약 조건이 있는가?"
      tags: [coupon, issuance, concurrency, redis, queue, oversue]

    - id: coupon-issuance-compensation
      category: issuance
      title: "선착순 쿠폰 발급 — Redis 선점 + DB 확정 + 보상 처리"
      summary: "Redis에서 재고와 사용자를 선점한 뒤 DB에 최종 저장하고, DB 실패 시 Lua Script로 원자적·멱등적 보상 처리를 해야 정합성을 보장할 수 있다"
      guidance:
        - "1단계 Redis 선점 (아직 확정 아님): DECR coupon:{id}:stock → 0 미만이면 발급 거부 / SADD coupon:{id}:reserved-users {userId} → 이미 존재하면 중복 거부"
        - "2단계 DB 저장 (@Transactional): coupon_issue INSERT, UNIQUE(coupon_id, user_id)로 최종 이중 발급 방어"
        - "3단계 성공 확정: Redis 선점 성공 + DB 저장 성공 = 발급 확정"
        - "4단계 DB 실패 시 Lua Script 보상: SREM 성공(실제로 선점 기록이 있었을 때)에만 INCR — 멱등적 보상 보장"
        - "reserved 플래그: Redis 선점 성공 여부를 boolean 변수로 관리, 선점 전 실패 시 보상 불필요"
        - "Lua Script 예시: local removed = redis.call('SREM', KEYS[2], ARGV[1]); if removed == 1 then redis.call('INCR', KEYS[1]); return 1 end; return 0"
      avoid-patterns:
        - "무조건 INCR 보상 — 중복 보상 시 재고 원본보다 증가 (원래 100 → 보상 2회 → 101)"
        - "DB @Transactional rollback으로 Redis 자동 복구 기대 — Redis는 DB 트랜잭션 범위 밖"
        - "보상 로직 누락 — DB 실패 후 Redis 선점 상태 방치, 재고 영구 손실"
        - "Redis 선점 없이 DB만으로 처리 — 트래픽 폭주 시 DB 커넥션 소진, 오버이슈 방어 불가"
      checklist:
        - "Redis 선점 성공 여부를 별도 변수로 추적하는가? (선점 전 실패 시 보상 불필요)"
        - "DB 실패 시 Redis 보상 처리가 실행되는가?"
        - "보상 처리가 Lua Script로 원자적으로 실행되는가?"
        - "보상 처리가 멱등적인가? (SREM 성공 시에만 INCR)"
        - "DB @Transactional과 Redis 보상 처리가 분리돼 있는가?"
      tags: [coupon, issuance, redis, compensation, saga, lua, idempotency]

    - id: promotion-rules
      category: promotion
      title: "프로모션 규칙 엔진 설계"
      summary: "조건이 복잡해지면 if-else 대신 DB 기반 규칙 엔진과 Strategy/Specification 패턴으로 설계해야 한다"
      guidance:
        - "규칙을 DB에 저장 (조건, 할인 유형, 우선순위, 기간) — 규칙 추가 시 코드 배포 불필요"
        - "규칙 엔진 패턴: 각 규칙을 Strategy 또는 Specification 패턴으로 구현"
        - "우선순위 기반 적용: 우선순위 높은 프로모션 먼저 적용, 중복 적용 여부는 플래그로 제어"
        - "프로모션 중복 적용 허용 시 최대 할인 한도 반드시 설정"
      avoid-patterns:
        - "단순 if-else 구현 — 규칙 추가마다 코드 배포 필요, 조건 조합 폭발 (5개 조건 AND/OR → 32가지 경우)"
        - "프로모션 중복 적용 시 최대 할인 한도 미설정 — 할인 금액 통제 불가"
      checklist:
        - "프로모션 중복 적용 시 최대 할인 한도가 설정됐는가?"
      tags: [promotion, rule-engine, strategy, specification, priority]

    - id: coupon-ai-pitfalls-checklist
      category: checklist
      title: "쿠폰/프로모션 구현 시 AI가 자주 빠뜨리는 패턴 체크리스트"
      summary: "쿠폰/프로모션 구현 완료 후 반드시 점검할 체크리스트"
      checklist:
        - "Redis 선점 + DB 확정 두 단계로 쿠폰 발급을 처리하는가?"
        - "DB 실패 시 Redis 보상 처리가 멱등적(Lua Script)으로 실행되는가?"
        - "쿠폰 유효 기간을 서버 시간 기준으로 검증하는가?"
        - "쿠폰 적용 대상 조건(카테고리/상품/최소금액)을 검증하는가?"
        - "쿠폰 중복 사용 방지 (상태 USED 확인)가 있는가?"
        - "쿠폰 상태 업데이트 시 동시성 제어(낙관락/CAS)가 있는가?"
        - "정률 할인의 최대 할인 금액 캡(cap)이 처리됐는가?"
        - "복수 쿠폰 적용 순서(정률 → 정액) 정책이 정의됐는가?"
        - "선착순 쿠폰 발급 시 오버이슈 방지 로직이 있는가?"
        - "userId + couponId에 UNIQUE 제약 조건이 있는가?"
        - "부분 취소 시 쿠폰 할인 금액 역산 및 무효화 처리가 있는가?"
        - "프로모션 중복 적용 시 최대 할인 한도가 설정됐는가?"
      tags: [checklist, coupon, promotion, pitfalls, review]
