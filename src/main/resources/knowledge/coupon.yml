coupon:
  items:
    - id: coupon-validation
      category: validation
      title: "쿠폰 유효성 검증 — AI가 항상 빠뜨리는 5가지"
      content: |
        쿠폰 적용 전 반드시 검증해야 할 5가지:

        1. 유효 기간: 발급일 기준 만료 여부 (서버 시간 기준, 클라이언트 시간 믿지 말 것)
        2. 사용 대상 조건: 특정 카테고리/상품/최소 주문금액 제한 여부
        3. 중복 사용 여부: 이미 사용된 쿠폰인지 확인 (쿠폰 상태: ISSUED → USED)
        4. 1인 사용 한도: 동일 쿠폰 코드를 동일 유저가 여러 번 사용하는 시나리오
        5. 발급 대상 검증: 특정 유저에게만 발급된 쿠폰을 타인이 사용하는 시나리오

        동시성 주의: 동시에 같은 쿠폰을 적용하는 요청이 들어오면 중복 사용 가능
        → 쿠폰 상태 업데이트 시 낙관락 또는 CAS(Compare-And-Swap) 처리 필수
      tags: [coupon, validation, expiry, duplicate-use, concurrency]

    - id: coupon-discount-calculation
      category: calculation
      title: "쿠폰 할인 금액 계산 — 복잡도 높은 케이스"
      content: |
        단순해 보이지만 엣지 케이스가 많은 영역:

        1. 정률 할인 (%) vs 정액 할인 (원):
           - 정률 할인의 최대 할인 금액 캡(cap) 처리 누락 잦음
           - 예: 20% 할인, 최대 5,000원 → 50,000원 주문 시 할인액 = min(10,000, 5,000) = 5,000원

        2. 복수 쿠폰 적용 순서:
           - 정률 쿠폰 먼저, 정액 쿠폰 나중 (순서에 따라 최종 할인액 달라짐)
           - 플랫폼 정책으로 쿠폰 중복 적용 가능 여부 정의 필요

        3. 쿠폰 + 포인트 병행 사용:
           - 쿠폰 할인 후 잔액에 포인트 적용인지, 원금에 포인트 적용인지 정책 확인 필수

        4. 부분 취소 시 쿠폰 처리:
           - 쿠폰 적용 주문의 일부 상품만 취소 시 쿠폰 할인 금액 비율 역산
           - 최소 주문금액 미달 시 쿠폰 자동 무효화 처리
      tags: [coupon, discount, calculation, partial-cancel, point]

    - id: coupon-issuance
      category: issuance
      title: "선착순 쿠폰 발급 — 동시성 제어"
      content: |
        선착순 쿠폰 발급은 이커머스 동시성 문제 중 가장 극단적인 케이스.

        문제: 1,000장 한정 쿠폰 발급 시 동시 요청 폭주 → 오버이슈 발생

        해결 전략:

        1. Redis 원자적 연산 (권장):
           DECR coupon:stock:{couponId}  → 0 미만이면 발급 거부
           SETNX coupon:issued:{couponId}:{userId}  → 중복 발급 방지

        2. DB 비관락:
           SELECT ... FOR UPDATE  → 발급 수량 체크 + 업데이트 원자적 처리
           단점: 트래픽 폭주 시 DB 커넥션 소진 위험

        3. 메시지 큐 (비동기 발급):
           발급 요청 → 큐 적재 → 워커가 순차 처리
           장점: DB 부하 분산, 단점: 즉시 발급 피드백 불가

        이중 발급 방어: userId + couponId 조합에 UNIQUE 제약 조건 필수
      tags: [coupon, issuance, concurrency, redis, queue, oversue]

    - id: promotion-rules
      category: promotion
      title: "프로모션 규칙 엔진 설계"
      content: |
        프로모션 규칙이 복잡해지는 이유:
        - 조건이 AND/OR 조합으로 중첩됨
        - 적용 우선순위가 프로모션마다 다름
        - 실시간으로 규칙 추가/수정/삭제가 필요함

        단순 if-else 구현의 한계:
        - 규칙 추가마다 코드 배포 필요
        - 조건 조합 폭발 (5개 조건 AND/OR → 32가지 경우)

        권장 설계:
        1. 규칙을 DB에 저장 (조건, 할인 유형, 우선순위, 기간)
        2. 규칙 엔진 패턴: 각 규칙을 Strategy 또는 Specification 패턴으로 구현
        3. 우선순위 기반 적용: 우선순위 높은 프로모션 먼저 적용, 중복 적용 여부는 플래그로 제어

        주의: 프로모션 중복 적용 허용 시 최대 할인 한도 반드시 설정
      tags: [promotion, rule-engine, strategy, specification, priority]

    - id: coupon-ai-pitfalls-checklist
      category: checklist
      title: "쿠폰/프로모션 구현 시 AI가 자주 빠뜨리는 패턴 체크리스트"
      content: |
        아래 항목을 반드시 확인하세요:

        [ ] 쿠폰 유효 기간을 서버 시간 기준으로 검증하는가?
        [ ] 쿠폰 적용 대상 조건(카테고리/상품/최소금액)을 검증하는가?
        [ ] 쿠폰 중복 사용 방지 (상태 USED 확인)가 있는가?
        [ ] 쿠폰 상태 업데이트 시 동시성 제어(낙관락/CAS)가 있는가?
        [ ] 정률 할인의 최대 할인 금액 캡(cap)이 처리됐는가?
        [ ] 복수 쿠폰 적용 순서(정률 → 정액) 정책이 정의됐는가?
        [ ] 선착순 쿠폰 발급 시 오버이슈 방지 로직이 있는가?
        [ ] userId + couponId에 UNIQUE 제약 조건이 있는가?
        [ ] 부분 취소 시 쿠폰 할인 금액 역산 및 무효화 처리가 있는가?
        [ ] 프로모션 중복 적용 시 최대 할인 한도가 설정됐는가?
      tags: [checklist, coupon, promotion, pitfalls, review]
