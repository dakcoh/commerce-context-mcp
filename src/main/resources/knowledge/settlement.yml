settlement:
  items:
    - id: settlement-timing
      category: timing
      title: "정산 시점과 정산 기준일 처리"
      summary: "정산 기준일 유형을 명확히 정의하고 주말/공휴일·부분 취소 이월 처리를 빠뜨리지 않아야 한다"
      guidance:
        - "구매 확정 기준: 고객이 '구매 확정'을 누른 날 → 가장 명확, 가장 늦음"
        - "배송 완료 기준: 택배사 배송 완료 확인 시점 → 자동화 가능"
        - "결제 완료 기준: 결제 성공 시점 → 가장 빠르나 반품 리스크"
        - "정산 기준일이 주말/공휴일이면 다음 영업일로 이월 처리 필요"
      avoid-patterns:
        - "환불/반품 가능 기간이 끝나기 전에 정산 — 차후 공제 처리 복잡도 폭증"
        - "주말/공휴일 이월 처리 누락 — 정산 기준일 오차 발생"
        - "부분 취소된 주문의 정산 금액 재계산 누락"
      checklist:
        - "정산 기준일 유형(구매 확정/배송 완료/결제 완료)이 명확히 정의됐는가?"
        - "주말/공휴일 정산 기준일 이월 처리가 있는가?"
      tags: [settlement, timing, purchase-confirm, delivery]

    - id: settlement-deduction
      category: deduction
      title: "정산 공제 항목 처리"
      summary: "정산 지급액은 판매금액에서 수수료·반품·프로모션·쿠폰 분담금을 차감하며 음수가 될 수 있다"
      guidance:
        - "정산 지급액 = 판매금액 - 수수료 - 반품금액 - 프로모션 분담금 - 쿠폰 분담금"
        - "수수료: 카테고리별 수수료율 다름, 정산 시점마다 요율 변동 가능"
        - "반품 공제: 이미 정산된 건의 반품 → 다음 정산 주기에 음수(-)로 처리"
        - "프로모션 분담금: 플랫폼 부담분 vs 셀러 부담분 비율 계산 필요"
        - "쿠폰 분담금: 쿠폰 발행 주체(플랫폼/셀러)에 따라 공제 대상 다름"
        - "공제 후 금액이 음수(-)가 될 수 있음 → 다음 정산 주기로 이월하거나 셀러에게 별도 청구"
      avoid-patterns:
        - "공제 후 음수 케이스 미처리 — 정산액 오류 발생"
        - "쿠폰/프로모션 분담금 비율 미계산 — 정산액 불일치"
      checklist:
        - "이미 정산된 건의 반품 시 다음 주기 음수 공제 처리가 있는가?"
        - "쿠폰/프로모션 분담금 비율 계산 로직이 있는가?"
        - "정산 공제 후 음수 발생 케이스가 처리됐는가?"
      tags: [settlement, deduction, fee, refund, promotion]

    - id: settlement-cycle
      category: cycle
      title: "정산 주기와 배치 처리"
      summary: "정산 배치는 멱등성·페이징·재시작 지점을 반드시 구현해 중복 정산과 OOM을 방지해야 한다"
      guidance:
        - "일반적인 정산 주기: 일 정산, 주 정산, 월 정산"
        - "멱등성 보장: 같은 날 배치가 2번 실행돼도 중복 정산 발생 X → 정산 실행 전 당일 정산 완료 여부 체크"
        - "대용량 처리: 주문 건수가 많을 때 페이징 처리 필수 (전체 조회 금지)"
        - "실패 복구: 배치 중단 시 재시작 지점(Cursor) 유지"
        - "정산 잠금: 배치 실행 중 해당 주문의 상태 변경 방지"
        - "정산 상태 흐름: UNSETTLED → SETTLEMENT_PENDING → SETTLED(정산액 확정·미지급) → (반품 시) DEDUCTED — 실지급 상태 전이(PAYOUT_REQUESTED→PAID/FAILED)는 지급 항목, 보류 분기(SETTLEMENT_HOLD)는 보류 항목 참고"
      avoid-patterns:
        - "전체 주문 한 번에 조회 — 대용량 데이터 OOM 발생"
        - "배치 중복 실행 시 멱등성 처리 누락 — 중복 정산 발생"
      checklist:
        - "정산 배치에 멱등성 처리가 있는가? (중복 실행 방지)"
        - "대용량 주문 처리 시 페이징이 적용됐는가?"
        - "정산 상태 전이 흐름이 정의됐는가? (UNSETTLED → SETTLED)"
      tags: [settlement, batch, cycle, idempotency, cursor]

    - id: settlement-integrity
      category: integrity
      title: "정산 데이터 정합성 검증"
      summary: "정산 완료 후 금액·건수 정합성을 검증하고 타임존을 일관되게 적용해야 한다"
      guidance:
        - "금액 정합성: 주문 합계 = 정산 지급액 + 수수료 + 공제 합계"
        - "건수 정합성: 정산 대상 주문 수 = 실제 정산 처리된 주문 수"
        - "중복 정산 없음: 동일 주문 ID가 여러 정산 레코드에 없는지 확인"
        - "누락 주문 없음: 정산 기준일 내 구매 확정 주문 중 미정산 건 0"
        - "타임존(UTC vs KST)을 서비스 전반에서 일관되게 적용"
      avoid-patterns:
        - "정산 배치 실행 중 주문 상태 변경 허용 — 동시성 문제로 정합성 파괴"
        - "UTC/KST 혼용 — 타임존 설정 오류로 정산 기준일 경계값 오차"
        - "정산 기준일 경계값 처리 오류 (23:59:59 vs 24:00:00)"
      checklist:
        - "정산 완료 후 금액/건수 정합성 검증 로직이 있는가?"
        - "타임존(UTC/KST)이 일관되게 적용됐는가?"
      tags: [settlement, integrity, validation, timezone]

    - id: settlement-statement
      category: statement
      title: "정산 명세서 — 시점 스냅샷으로 박제한다"
      summary: "정산 명세서는 매번 재계산하지 말고 정산 확정 시점의 금액·요율을 불변 스냅샷으로 저장해야 한다"
      guidance:
        - "명세 구성: 정산 ID + 셀러 ID + 정산 기준 기간 + 주문별 라인(판매금액·수수료·공제) + 최종 지급액 breakdown"
        - "스냅샷 저장: 명세 생성 시점의 수수료율, 쿠폰/프로모션 분담률, 적용 금액을 컬럼에 그대로 기록 — 이후 정책이 바뀌어도 과거 명세는 불변"
        - "지급액 = Σ(주문 판매금액) - Σ(수수료) - Σ(반품 공제) - Σ(분담금) — 명세에 각 합계를 명시적으로 남겨 검증 가능하게"
        - "셀러 조회 API: 본인 정산 명세만 조회(소유권 검증), 기간·상태 필터, cursor 페이징"
        - "명세-원장 정합성: 명세 최종 지급액 = 실제 지급(payout) 트랜잭션 금액과 일치해야 함"
        - "명세는 생성 후 수정 불가(append-only) — 정정이 필요하면 보정 명세를 새로 발행"
      avoid-patterns:
        - "명세를 조회할 때마다 현재 요율로 재계산 — 수수료율이 바뀌면 과거 명세 금액이 흔들려 셀러 분쟁 발생"
        - "명세 라인 없이 합계 금액만 저장 — 셀러가 '왜 이 금액인지' 검증 불가, CS 폭증"
        - "명세를 가변(mutable) 레코드로 두고 in-place 수정 — 감사 추적 불가, 정정 이력 소실"
      checklist:
        - "정산 명세가 생성 시점의 요율·금액을 스냅샷으로 박제하는가?"
        - "명세에 주문별 라인과 공제 breakdown이 남는가?"
        - "명세 최종 지급액이 실제 지급 트랜잭션 금액과 일치하는가?"
        - "셀러 명세 조회에 소유권 검증이 있는가?"
      tags: [settlement, statement, snapshot, immutable, breakdown, seller]

    - id: settlement-tax
      category: tax
      title: "정산 세무 처리 — 부가세·원천징수·면세 구분"
      summary: "정산 금액은 공급가액과 부가세를 분리 기록하고, 셀러 유형·상품 과세 구분에 따라 세금계산서·원천징수를 처리해야 한다"
      guidance:
        - "부가세 분리: 과세 상품은 결제금액 = 공급가액 + 부가세(10%) → 정산 시 공급가액과 부가세를 분리 컬럼으로 기록 (price_supply, price_vat)"
        - "면세/과세 구분: 도서·일부 농축수산물 등 면세 상품은 부가세 0 — 상품에 tax_type(TAXABLE/EXEMPT) 보유, 정산 계산에 반영"
        - "세금계산서 발행: 발행 기준 시점은 정산 확정 시점으로 고정, 월 단위 합산 발행 또는 건별 발행 정책 정의 — 플랫폼 역발행 여부 명확화"
        - "원천징수: 개인(비사업자) 셀러의 사업/기타소득은 원천징수 대상 — 셀러 유형(법인/개인사업자/개인)에 따라 원천징수율 적용 후 지급"
        - "수수료 세금계산서: 플랫폼이 셀러에게 청구하는 중개수수료도 부가세 포함 — 셀러↔플랫폼 양방향 세금 처리"
        - "세무 신고용 원장은 법정 보존기간(전자세금계산서 5년) 동안 불변 보존"
      avoid-patterns:
        - "부가세 포함/별도를 혼동 — 공급가액 기준 수수료 계산과 결제금액 기준 계산이 섞이면 정산액 오차"
        - "면세 상품에 부가세를 부과하거나, 과세 상품의 부가세를 누락"
        - "개인 셀러 원천징수 누락 — 세무 리스크 및 지급액 과다 지급"
        - "세금계산서 발행 시점을 결제 시점으로 잡음 — 취소·반품 시 수정세금계산서 폭증"
      checklist:
        - "정산에 공급가액과 부가세가 분리 기록되는가?"
        - "면세/과세 상품 구분이 정산 계산에 반영되는가?"
        - "셀러 유형에 따른 원천징수 처리가 있는가?"
        - "세금계산서 발행 시점이 정산 확정 기준으로 고정됐는가?"
      tags: [settlement, tax, vat, withholding, tax-invoice, exemption]

    - id: settlement-hold
      category: hold
      title: "정산 보류 — 분쟁·클레임 중인 건은 지급에서 제외한다"
      summary: "반품·클레임·분쟁이 진행 중인 주문과 보류 사유가 있는 셀러는 정산 대상에서 제외하고, 해제 시 다음 주기에 합산해야 한다"
      guidance:
        - "주문 단위 보류: 반품 요청·교환·분쟁·결제 분쟁(chargeback) 진행 중인 주문은 정산 대상에서 제외(SETTLEMENT_HOLD)"
        - "셀러 단위 보류: 미배송 누적, 페널티 미납, 세금 문제, 탈퇴/폐업 진행 중인 셀러는 지급 보류"
        - "부분 보류: 셀러의 정상 주문은 정산하고 문제 주문만 보류 — 전체 정산을 막지 않음"
        - "보류 해제: 분쟁 종결 시 보류 해제 후 다음 정산 주기에 합산(이월) 처리"
        - "보류는 상태 전이 + 사유 코드 + 감사 로그(누가/언제/왜)를 필수로 남김"
        - "보류 금액은 '미지급 충당금'으로 별도 집계 — 플랫폼 현금흐름 관리에 반영"
      avoid-patterns:
        - "분쟁·반품 가능 기간 중인 주문을 정산·지급 — 이후 환불 시 셀러에게서 회수 불가(미수금 발생)"
        - "문제 주문 하나 때문에 셀러 전체 정산을 막음 — 정상 거래 셀러 현금흐름 악화, CS 폭증"
        - "보류 사유·해제 이력 미기록 — 셀러 분쟁 시 근거 제시 불가"
      checklist:
        - "반품/클레임/분쟁 진행 중인 주문이 정산에서 제외되는가?"
        - "셀러 단위 보류와 주문 단위 보류가 분리됐는가? (부분 보류 가능)"
        - "보류 해제 시 다음 주기 합산 처리가 있는가?"
        - "보류 사유와 해제 이력이 감사 로그로 남는가?"
      tags: [settlement, hold, dispute, chargeback, claim, audit]

    - id: settlement-payout
      category: payout
      title: "정산 지급(실이체) — 확정과 이체를 분리하고 멱등하게"
      summary: "정산 확정과 실제 은행 이체는 상태를 분리하고, 이체 결과 확인 전에는 완료로 처리하지 않으며 이중 지급을 멱등 키로 막아야 한다"
      guidance:
        - "상태 분리: 정산 확정(SETTLED) → 지급 지시(PAYOUT_REQUESTED) → 이체 실행 → 이체 결과 확인(PAID/FAILED) — 결제 망취소와 동일한 불확실성 관리"
        - "지급 멱등성: payout_id + UNIQUE(settlement_id) 제약 — 배치 재실행/재시도 시 이중 이체 방지"
        - "이체 실패 처리: 계좌 오류·한도 초과·휴면 계좌는 FAILED로 분리하고 사유 기록, 재시도 또는 셀러 계좌 갱신 요청"
        - "결과 불명확(이체 요청 후 응답 없음): UNCERTAIN 상태로 두고 은행 거래 내역 조회로 확정 — 임의로 성공 처리 금지"
        - "최소 정산금액: 임계치(예: 10,000원) 미만은 지급하지 않고 다음 주기로 이월(carry-over)"
        - "개인 셀러 실지급액: 정산액에서 원천징수(세무 항목 참고)를 추가 차감한 금액을 이체 — '정산액'과 '실이체액'이 다를 수 있음"
        - "지급대행/PG 정산금과 플랫폼 자체 지급을 구분 — 자금 출처와 책임 주체 분리"
      avoid-patterns:
        - "이체 결과 확인 전에 SETTLED/완료 처리 — 이체 실패 시 '완료인데 미지급' 상태로 셀러 미지급 누락"
        - "멱등 키 없이 배치 재실행 — 같은 정산 건이 두 번 이체돼 과다 지급"
        - "이체 실패를 단순 예외로 흘림 — 미지급 잔액 추적 불가"
        - "정산액을 그대로 이체 — 개인 셀러 원천징수를 차감하지 않아 과다 지급"
        - "소액을 매 주기 이체 — 이체 수수료가 정산액을 초과하는 역마진"
      checklist:
        - "정산 확정과 실제 이체 상태가 분리돼 있는가?"
        - "지급에 멱등 키(UNIQUE 제약)가 있어 이중 이체를 막는가?"
        - "이체 결과 확인 전에는 완료로 처리하지 않는가? (불명확 시 UNCERTAIN)"
        - "개인 셀러 지급 시 원천징수를 차감한 실이체액으로 처리하는가?"
        - "최소 정산금액 미만 이월 처리가 있는가?"
      tags: [settlement, payout, transfer, idempotency, uncertain, carry-over, withholding]

    - id: settlement-ai-pitfalls-checklist
      category: checklist
      title: "정산 구현 시 AI가 자주 빠뜨리는 패턴 체크리스트"
      summary: "정산 구현 완료 후 반드시 점검할 체크리스트"
      checklist:
        - "정산 기준일 유형(구매 확정/배송 완료/결제 완료)이 명확히 정의됐는가?"
        - "주말/공휴일 정산 기준일 이월 처리가 있는가?"
        - "정산 배치에 멱등성 처리가 있는가? (중복 실행 방지)"
        - "대용량 주문 처리 시 페이징이 적용됐는가?"
        - "이미 정산된 건의 반품 시 다음 주기 음수 공제 처리가 있는가?"
        - "쿠폰/프로모션 분담금 비율 계산 로직이 있는가?"
        - "정산 공제 후 음수 발생 케이스가 처리됐는가?"
        - "정산 완료 후 금액/건수 정합성 검증 로직이 있는가?"
        - "타임존(UTC/KST)이 일관되게 적용됐는가?"
        - "정산 상태 전이 흐름이 정의됐는가? (UNSETTLED → SETTLED)"
        - "정산 명세가 생성 시점의 요율·금액을 스냅샷으로 박제하는가?"
        - "정산에 공급가액·부가세가 분리되고 면세/원천징수가 반영됐는가?"
        - "분쟁·클레임 중인 주문이 정산 보류로 지급에서 제외되는가?"
        - "정산 확정과 실제 이체가 분리되고 지급이 멱등한가? (이중 이체 방지)"
      tags: [checklist, pitfalls, settlement, review]
