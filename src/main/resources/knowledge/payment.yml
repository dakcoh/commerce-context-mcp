payment:
  items:
    - id: webhook-handling
      category: webhook
      title: "결제 웹훅 처리 원칙"
      summary: "PG사 웹훅은 즉시 HTTP 200 응답 후 비동기 처리해야 재전송 루프를 막을 수 있다"
      guidance:
        - "수신 즉시 HTTP 200 응답 필수 — 처리 로직 완료 후 응답하면 PG사 타임아웃(5~10초)으로 재전송 루프 발생"
        - "패턴: 수신 → 즉시 200 → 비동기 큐(Kafka/DB) → 별도 워커 처리"
        - "PG사가 제공하는 HMAC-SHA256 서명 반드시 검증"
        - "웹훅 ID 또는 결제 번호로 중복 수신 여부 확인 후 멱등성 처리"
      avoid-patterns:
        - "처리 완료 후 HTTP 200 응답 — PG사 타임아웃 재전송 루프 유발"
        - "서명 검증 누락 — 외부 위조 웹훅으로 결제 완료 처리 가능 (보안 취약점)"
        - "멱등성 처리 누락 — PG사 재전송 시 중복 결제 완료 처리"
      checklist:
        - "웹훅 수신 즉시 HTTP 200 응답을 반환하는가? (처리 완료 후 응답 X)"
        - "웹훅 서명(HMAC-SHA256) 검증 로직이 있는가?"
        - "웹훅 중복 수신 방어 (멱등성 처리)가 있는가?"
      tags: [webhook, async, signature, idempotency, security]

    - id: payment-status-machine
      category: state-machine
      title: "결제 상태 머신과 전이 가드 (AI가 항상 빠뜨리는 핵심)"
      summary: "결제 상태는 유한 상태 머신으로 정의하고 각 전이에 가드 조건을 반드시 적용해야 중복 결제와 잘못된 상태 전이를 막을 수 있다"
      guidance:
        - "상태 정의: PENDING → PROCESSING → PAID | FAILED | UNCERTAIN | CANCELLED"
        - "UNCERTAIN → (scheduler 주기 조회) → PAID | CANCELLED (망취소 상태)"
        - "PAID → REFUND_REQUESTED → REFUNDED (전액환불) | PARTIAL_CANCELLED (부분취소)"
        - "전이 가드 — PENDING에서만 결제 요청 가능, 이미 PAID/FAILED/CANCELLED 상태면 요청 거부"
        - "전이 가드 — PAID에서만 환불/취소 가능"
        - "전이 가드 — UNCERTAIN 상태는 scheduler만 처리 가능, 사용자/API 직접 변경 불가"
        - "상태 전이는 낙관락(@Version) 또는 CAS로 원자적 처리 — 동시 요청이 같은 전이를 중복 실행 방지"
        - "허용되지 않는 전이 요청은 즉시 IllegalStateException 등 명확한 예외 반환"
      avoid-patterns:
        - "상태 검증 없이 결제 요청 — 이미 PAID인 주문에 중복 결제 시도 발생"
        - "PAID → PENDING 역방향 전이 허용 — 결제 완료된 주문을 재결제 가능 상태로 되돌림"
        - "UNCERTAIN 상태 미구현 — 망취소 응답 불명확 시 영구 PENDING 방치"
        - "전이 로직을 여러 서비스에 분산 — 상태 전이 규칙 불일치로 정합성 파괴"
      checklist:
        - "결제 요청 전 PENDING 상태 검증이 있는가?"
        - "UNCERTAIN 상태에서 scheduler 자동 처리 로직이 있는가?"
        - "잘못된 전이 시도에 적절한 예외를 반환하는가?"
        - "상태 전이가 낙관락(@Version) 또는 CAS로 원자적으로 처리되는가?"
        - "환불 요청 전 PAID 상태 검증이 있는가?"
      tags: [state-machine, payment-status, transition, guard, concurrency]

    - id: duplicate-payment-guard
      category: duplicate
      title: "중복 결제 방어"
      summary: "결제 버튼 중복 클릭·네트워크 재시도로 인한 이중 결제를 3중 방어로 막는다"
      guidance:
        - "주문 상태 검증: 결제 요청 전 주문이 PENDING 상태인지 확인 — 이미 PAID/CANCELLED 상태면 결제 진행 X"
        - "멱등성 키: 결제 요청 시 고유 키 포함 (PG사 API에 Idempotency-Key 헤더 전달) — 같은 키로 중복 요청 시 PG사가 첫 번째 결과를 그대로 반환"
        - "PG사 결제 번호 중복 확인: DB에 동일 pg_payment_id 존재 여부 체크"
        - "낙관락(@Version)으로 주문 상태 업데이트 시 동시 요청 방어"
      avoid-patterns:
        - "주문 상태 검증 없이 결제 요청 — 이미 결제된 주문에 중복 결제 발생"
        - "멱등성 키 미사용 — 네트워크 재시도 시 PG사에서 실제 결제 중복 발생"
      checklist:
        - "결제 요청 전 주문 상태(PENDING)를 검증하는가?"
        - "PG사 API 호출 시 Idempotency-Key 헤더를 전달하는가?"
        - "동시 결제 요청에 낙관락(@Version) 또는 상태 CAS 처리가 있는가?"
      tags: [duplicate, idempotency, optimistic-lock, payment-status]

    - id: network-cancellation
      category: network-cancel
      title: "망취소 처리 (결제 응답 불명확 상황)"
      summary: "결제 응답을 받지 못한 망취소 상황은 스케줄러로 PG사에 상태를 조회해 확정해야 한다"
      guidance:
        - "결제 요청 직전에 DB에 PENDING 상태로 기록"
        - "응답 타임아웃 발생 시 → 주문을 UNCERTAIN 상태로 전환"
        - "스케줄러가 주기적으로 PG사에 결제 상태 조회 (결제 조회 API 호출)"
        - "PG사 응답에 따라 PAID / CANCELLED 로 상태 확정"
        - "확정 불가 시 설정된 타임아웃(예: 30분) 후 자동 취소 처리"
      avoid-patterns:
        - "망취소 상태 주문 방치 — 재고가 예약된 채 고객에게 서비스 불가"
        - "망취소 케이스 자체를 구현하지 않음 — AI가 거의 항상 빠뜨리는 케이스"
      checklist:
        - "망취소 상황 (응답 타임아웃) 처리 로직이 있는가?"
      tags: [network-cancel, timeout, scheduler, payment-status, uncertainty]

    - id: partial-refund
      category: refund
      title: "부분 취소 / 환불 처리"
      summary: "부분 취소 시 쿠폰/포인트 환불 금액을 정확히 역산하고 정산 완료 여부를 반드시 확인해야 한다"
      guidance:
        - "재고 복구 수량 계산: 취소된 상품 수량만큼만 재고 복구"
        - "쿠폰 할인 비율 역산: 예) 10,000원 주문에 1,000원 쿠폰 사용 → 5,000원 상품 부분 취소 시 환불액 = 5,000 × (9,000/10,000) = 4,500원"
        - "이미 정산 완료된 건의 환불은 별도 출금 프로세스 필요 — 정산 완료 여부를 환불 API 호출 전 반드시 확인"
        - "부분 취소 후 남은 주문 금액으로 쿠폰 사용 조건 재검증"
        - "포인트 적립 금액 재계산 (일부 취소 시 적립 포인트도 차감)"
      avoid-patterns:
        - "쿠폰/포인트 환불 금액 역산 누락 — 환불액 과부족 발생"
        - "정산 완료 여부 미확인 후 환불 처리 — PG사 정산 후 환불은 별도 출금 프로세스 필요"
      checklist:
        - "부분 취소 시 쿠폰/포인트 환불 금액을 역산하는가?"
        - "정산 완료 후 환불 처리를 별도 프로세스로 분리했는가?"
      tags: [partial-refund, coupon, point, settlement, refund-calculation]

    - id: payment-idempotency
      category: idempotency
      title: "결제 API 멱등성 키 설계"
      summary: "결제 요청에 Idempotency-Key를 적용해 네트워크 재시도로 인한 이중 결제를 방지한다"
      guidance:
        - "주문 단위 키 설계: \"payment:{orderId}:{attempt}\" — 재시도마다 attempt 증가"
        - "또는 UUID v4를 결제 시도마다 생성, DB에 저장"
        - "HTTP 헤더로 전달: Idempotency-Key: {key}"
        - "같은 키로 재요청 시 PG사가 첫 번째 결과를 캐시해서 반환 (실제 결제 미발생)"
        - "키 TTL: 24시간 권장 (PG사 정책에 따라 다름)"
      avoid-patterns:
        - "결제 실패 후 재시도 시 동일 키 재사용 — 실패 결과가 캐시돼 재시도가 무의미해짐"
        - "멱등성 키 미사용 — 네트워크 오류로 같은 결제 요청이 2번 전달되면 이중 결제 발생"
      checklist:
        - "결제 실패 재시도 시 새 멱등성 키를 생성하는가?"
      tags: [idempotency, payment-key, retry, pg]

    - id: payment-ai-pitfalls-checklist
      category: checklist
      title: "결제 구현 시 AI가 자주 빠뜨리는 패턴 체크리스트"
      summary: "결제 구현 완료 후 반드시 점검할 체크리스트"
      checklist:
        - "결제 상태 머신의 모든 전이에 가드 조건이 정의됐는가?"
        - "UNCERTAIN 상태에서 scheduler 자동 처리 로직이 있는가?"
        - "잘못된 전이 시도에 적절한 예외를 반환하는가?"
        - "웹훅 수신 즉시 HTTP 200 응답을 반환하는가? (처리 완료 후 응답 X)"
        - "웹훅 서명(HMAC-SHA256) 검증 로직이 있는가?"
        - "웹훅 중복 수신 방어 (멱등성 처리)가 있는가?"
        - "결제 요청 전 주문 상태(PENDING)를 검증하는가?"
        - "PG사 API 호출 시 Idempotency-Key 헤더를 전달하는가?"
        - "망취소 상황 (응답 타임아웃) 처리 로직이 있는가?"
        - "부분 취소 시 쿠폰/포인트 환불 금액을 역산하는가?"
        - "정산 완료 후 환불 처리를 별도 프로세스로 분리했는가?"
        - "결제 실패 재시도 시 새 멱등성 키를 생성하는가?"
        - "동시 결제 요청에 낙관락(@Version) 또는 상태 CAS 처리가 있는가?"
      tags: [checklist, pitfalls, review, payment]
